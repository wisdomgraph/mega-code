# Client-side configuration for mega-code notifications and prompts.
# Templates use Python string.Template syntax: ${var} for substitution.

no_outputs_notification: |
  ╔═══════════════════════════════════════════════════════════════════╗
  ║  ⚠️  MEGA-CODE: PIPELINE COMPLETE - NO NEW OUTPUTS                 ║
  ╚═══════════════════════════════════════════════════════════════════╝

  The pipeline completed but did not generate any new skills, strategies, or lessons.
  This may happen if:
  - The session(s) didn't contain learnable patterns
  - Quality gates filtered out low-quality outputs
  - No new patterns were detected

  Try running on more sessions with: $mega-code-wisdom-gen --project

error_notification: |
  ═══════════════════════════════════════════════════════════════════════
  ❌ MEGA-CODE: PIPELINE ERROR
  ═══════════════════════════════════════════════════════════════════════

  The pipeline encountered an error:

  ${error}

  Please check the logs for more details.
  You can try again with: $mega-code-wisdom-gen

review_notification:
  workflow_template: |
    ┌───────────────────────────────────────────────────────────────────┐
    │                    MANDATORY WORKFLOW FOR CODEX                   │
    └───────────────────────────────────────────────────────────────────┘

    You MUST execute this workflow IMMEDIATELY:

    ══════════════════════════════════════════════════════════════════════
    STEP 1: READ & ANALYZE (do this silently)
    ══════════════════════════════════════════════════════════════════════
    For EACH pending item, use the Read tool to:
    - Read full content from the paths listed above
    - Analyze quality, clarity, and completeness
    - Identify potential refinements

    ══════════════════════════════════════════════════════════════════════
    STEP 2: PRESENT REVIEW & ASK USER
    ══════════════════════════════════════════════════════════════════════
    First, review ALL candidate skills and strategies internally.

    Classify each item as:
    - RECOMMENDED = good quality, useful, and worth installing
    - NOT RECOMMENDED = not good enough, redundant, conflicting, risky, or not worth installing

    Mark an item as NOT RECOMMENDED if it:
    - has low quality or weak usefulness
    - is substantially redundant with existing content
    - conflicts with existing files, conventions, or patterns
    - has meaningful overwrite or merge risk
    - requires significant refinement before installation

    ══════════════════════════════════════════════════════════════════════
    RECOMMENDATION FILTER (STRICT)
    ══════════════════════════════════════════════════════════════════════
    After classification:

    - Build RECOMMENDED_ITEMS = all items marked as RECOMMENDED
    - Build EXCLUDED_ITEMS = all items marked as NOT RECOMMENDED

    CRITICAL RULES:
    - Show the user RECOMMENDED_ITEMS as primary selectable options
    - EXCLUDED_ITEMS must NOT be selectable by default
    - It is allowed to expose EXCLUDED_ITEMS only through an explicit user override step
    - Do NOT fallback to using all items or pending items under any condition

    If RECOMMENDED_ITEMS is empty:
    - Tell the user that no items are recommended for installation
    - You may offer an explicit override to allow installing EXCLUDED_ITEMS

    ══════════════════════════════════════════════════════════════════════
    PRESENT RECOMMENDED ITEMS
    ══════════════════════════════════════════════════════════════════════
    You MUST format the output EXACTLY as follows.
    Do NOT use previous formatting styles.
    Do NOT omit icons.
    Use ONLY Unicode emoji characters (e.g., ✅, ⚠️).
    Do NOT use colon-based emoji formats like :warning: or :white_check_mark:.

    For skills, read the `roi` field from the SKILL.md frontmatter and present only `performance_increase` and `token_savings`. Never show `model`.
    When ROI is shown, you MUST include the exact suffix: "(vs without this skill)".
    Do NOT paraphrase, shorten, or omit this suffix.

    Recommended

    For EACH recommended skill, show the user:

    ✅ <name>
    - What it does: <what this skill does>
    - Why it helps: <where this is useful / what problem it solves>
    - ROI: +<performance_increase>% performance, −<token_savings>% tokens (vs without this skill)  (if available)

    For EACH recommended strategy, show the user:

    ✅ <name>
    - What it does: <what this strategy does>
    - Why it helps: <where this is useful / what problem it solves>

    Not recommended

    For EACH excluded skill, optionally show:

    ⚠️ <name> — <short reason: duplicate / conflict risk / low usefulness / etc>
    - What it does: <what this skill does>
    - ROI: Performance +<performance_increase>, Token savings <token_savings>  (if available)

    For EACH excluded strategy, optionally show:

    ⚠️ <name> — <short reason: duplicate / conflict risk / low usefulness / etc>
    - What it does: <what this strategy does>

    Only show ROI for skills.
    If ROI is not present in the frontmatter, omit the ROI line.

    Use the same structure for strategies.

    You may optionally add one short summary line such as:
    "<N> items were excluded because they were not recommended for installation."

    ══════════════════════════════════════════════════════════════════════
    STEP 2 (continued): ASK USER (use request_user_input tool)
    ══════════════════════════════════════════════════════════════════════
    Use `request_user_input` (Codex CLI built-in) to ask what to install.

    **`request_user_input` constraints:**
    - 1-3 questions per call
    - 2-3 options per question (single-select only)
    - An "Other" freeform option is auto-added by the tool

    **Question flow — bulk-then-per-item:**

    1. **Bulk question** (skip if only 1 recommended item — go straight to per-item):
       Use `request_user_input` with one question:
       "N recommended items ready. What would you like to do?"
       Options: "Install all" / "Pick individually" / "Skip all"

       - **Install all** → select all RECOMMENDED_ITEMS, skip to location question
       - **Skip all** → no recommended items selected, skip to excluded items question
       - **Pick individually** → proceed to per-item loop below

    2. **Per-item loop** (only if "Pick individually" or exactly 1 recommended item):
       For each recommended item, use `request_user_input` with one question:
       "Install <name>? (<type>: <short description>)"
       Options: "Yes" / "No"

    3. **Excluded items** (only if EXCLUDED_ITEMS exist):
       Use `request_user_input` with one question:
       "N items were not recommended. Review them?"
       Options: "Yes" / "No"

       If "Yes": run the same per-item loop for each excluded item:
       "Install <name>? (⚠️ not recommended — <short reason>)"
       Options: "Yes" / "No"

    4. **Installation location** (only if any items were selected):
       Use `request_user_input` with one question:
       "Where should items be installed?"
       Options:
       - "Project level" (.agents/skills/ and .agents/rules/ in current project + AGENTS.md)
       - "User level" (~/.agents/skills/ and ~/.agents/rules/ shared across all projects + ~/.agents/AGENTS.md)

    If no items are recommended and user does NOT opt into reviewing excluded items, proceed directly to Step 3.
    If user selects "No" for all items, skip installation location and proceed to Step 3.

    ══════════════════════════════════════════════════════════════════════
    STEP 3: INSTALL APPROVED ITEMS
    ══════════════════════════════════════════════════════════════════════
    Based on user's choices:

    **Skills:**
    - Project level → .agents/skills/<name>/SKILL.md
    - User level → ~/.agents/skills/<name>/SKILL.md

    **Strategies:**
    1. Write each strategy file:
       - Project level → .agents/rules/mega-code/<name>.md
       - User level → ~/.agents/rules/mega-code/<name>.md

    2. Update AGENTS.md so Codex loads the strategy references:
       - Project level → project-root AGENTS.md
       - User level → ~/.agents/AGENTS.md

       Read the target AGENTS.md (create if it does not exist).
       Find the section between these markers:
         <!-- mega-code:strategies:start -->
         ...
         <!-- mega-code:strategies:end -->

       If the markers exist, replace everything between them.
       If the markers do not exist, append the section at the end of the file.

       The section content MUST follow this exact format:

         <!-- mega-code:strategies:start -->
         ## Mega-Code Strategies

         Strategies extracted from coding sessions by [mega-code](https://megacode.ai).
         Read each linked file when its described context applies to your current task.

         - [<name>](.agents/rules/mega-code/<name>.md) — <description>. Read when: <relevance context>.
         <!-- mega-code:strategies:end -->

       The "Read when" context should describe when the strategy is relevant,
       derived from the strategy's category or content (e.g., "writing error
       handling code", "designing API endpoints", "working with database queries").

       Include ALL currently installed strategies in the section, not just
       the ones being installed now. Read .agents/rules/mega-code/ to find
       any previously installed strategies and include them too.

    Use Write tool to create/update all files.

    ══════════════════════════════════════════════════════════════════════
    STEP 4: ARCHIVE
    ══════════════════════════════════════════════════════════════════════
    After successful installation, ARCHIVE (not delete) all pending items.

    Run this command EXACTLY as shown (do NOT change imports):

    ```bash
    MEGA_DIR=$(cat ~/.local/share/mega-code/plugin-root 2>/dev/null || cat ~/.local/share/mega-code/pkg-breadcrumb 2>/dev/null || echo ~/.claude/mega-code)
    export UV_CACHE_DIR="${{UV_CACHE_DIR:-$MEGA_DIR/.uv-cache}}"
    cd "$MEGA_DIR" && uv run python -c "
    # IMPORTANT: archive_pending_items is in feedback module, NOT pending module
    from mega_code.client.feedback import archive_pending_items
    # IMPORTANT: listing functions are get_pending_*, NOT list_pending_*
    from mega_code.client.pending import get_pending_skills, get_pending_strategies
    skills = get_pending_skills()
    strategies = get_pending_strategies()
    # Build installed_names set from the items user chose to install in Step 3
    installed_names = ${{installed_names}}  # <-- fill with set of installed item names from Step 2
    run_id = archive_pending_items(
        run_id='${{run_id}}',
        project_id='${{project_id}}',
        installed_skills=[s for s in skills if s.name in installed_names],
        skipped_skills=[s for s in skills if s.name not in installed_names],
        installed_strategies=[s for s in strategies if s.name in installed_names],
        skipped_strategies=[s for s in strategies if s.name not in installed_names],
    )
    print(f'ARCHIVED_RUN_ID={{run_id}}')
    "
    ```

    Parse ARCHIVED_RUN_ID from the output.
    Report summary of what was installed and where.

    ⚡ START STEP 1 NOW - READ THE PENDING FILES IMMEDIATELY ⚡
