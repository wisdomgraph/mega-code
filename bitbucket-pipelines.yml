# Bitbucket Pipelines configuration for mega-code-oss
#
# Pipeline structure:
#   default (every push):
#     1. Lint & Format Check — ruff format --check + ruff check
#     2. Unit Tests          — pytest (when tests exist)

image: python:3.12

definitions:
  caches:
    uv-cache:
      key:
        files:
          - pyproject.toml
      path: .venv

pipelines:
  default:
    - step:
        name: "Lint & Test"
        caches:
          - uv-cache
        script:
          - curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/usr/local/bin sh
          - uv sync --extra telemetry
          # Format check (non-destructive)
          - uv run ruff format mega_code/ --check
          # Lint
          - uv run ruff check mega_code/
          # Run tests if any exist
          - |
            if [ -d tests ] && find tests -name "test_*.py" -print -quit | grep -q .; then
              uv run pytest tests/ -v --timeout=60
            else
              echo "No tests found — skipping"
            fi
